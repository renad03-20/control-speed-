<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Control Speed</title>
<style>
  :root {
    color-scheme: light;
  }
  body {
    width: 260px;
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #ffffff;
    color: #1a1a1a;
  }
  h1 {
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 12px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .speed-display {
    text-align: center;
    font-size: 32px;
    font-weight: 700;
    margin: 4px 0 12px 0;
    color: #4f46e5;
  }
  input[type="range"] {
    width: 100%;
    accent-color: #4f46e5;
    margin-bottom: 12px;
  }
  .presets {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 12px;
  }
  .presets button {
    padding: 6px 0;
    font-size: 12px;
    border: 1px solid #e0e0e0;
    background: #f7f7f8;
    border-radius: 6px;
    cursor: pointer;
    color: #1a1a1a;
  }
  .presets button:hover {
    background: #ececff;
    border-color: #4f46e5;
  }
  .presets button.active {
    background: #4f46e5;
    border-color: #4f46e5;
    color: #fff;
  }
  .reset {
    width: 100%;
    padding: 8px 0;
    font-size: 13px;
    border: none;
    background: #f0f0f0;
    border-radius: 6px;
    cursor: pointer;
    color: #444;
  }
  .reset:hover {
    background: #e5e5e5;
  }
  .status {
    margin-top: 10px;
    font-size: 11px;
    color: #888;
    text-align: center;
    min-height: 14px;
  }
</style>
</head>
<body>
  <h1>Control Speed</h1>
  <div class="speed-display" id="speedValue">1.00x</div>
  <input type="range" id="speedSlider" min="0.1" max="4" step="0.05" value="1">
  <div class="presets" id="presets">
    <button data-speed="0.5">0.5x</button>
    <button data-speed="1">1x</button>
    <button data-speed="1.5">1.5x</button>
    <button data-speed="2">2x</button>
    <button data-speed="2.5">2.5x</button>
    <button data-speed="3">3x</button>
    <button data-speed="0.75">0.75x</button>
    <button data-speed="4">4x</button>
  </div>
  <button class="reset" id="resetBtn">Reset to 1x</button>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
